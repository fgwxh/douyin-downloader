services:
  douyin-download-ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    container_name: douyin-download-ui
    restart: unless-stopped
    ports:
      - "8501:8501"
    volumes:
      - /vol1/1000/docker/dyxz/data:/app/data:rw
      - /vol1/1000/docker/dyxz/downloads:/app/downloads:rw
      - /vol1/1000/docker/dyxz/cookies.json:/app/cookies.json:rw
      - /vol1/1000/docker/dyxz/settings_default.json:/app/settings_default.json:rw
      - /vol1/1000/docker/dyxz/settings_mine.json:/app/settings_mine.json:rw
    environment:
      - TZ=Asia/Shanghai
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_ENABLE_CORS=true
      - STREAMLIT_SERVER_ENABLE_WEBSOCKETS=true
      - DOCKER_CONTAINER=true
